{% extends "vocal.html" %}

{% block content %}
<div class="centered-page">
    <div class="form-card">
        <h2>Add project or pack</h2>
        {% if error %}
        <div class="form-error">
            <div class="form-error-message">{{ error }}</div>
            {% if hint %}<div class="form-error-hint">{{ hint }}</div>{% endif %}
        </div>
        {% endif %}
        <form action="/add" method="post">
            <div class="form-group">
                <label for="resource-url">URL</label>
                <input type="text" id="resource-url" name="url" placeholder="https://..."
                       autocomplete="off" value="{{ url or '' }}">
            </div>
            <input type="submit" value="Add">
        </form>
    </div>
</div>
{% endblock %}
